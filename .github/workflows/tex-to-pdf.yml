name: Compile LaTeX files and Release

on:
  push:
    branches:
      - main
    paths-ignore:
      - Dockerfile
      - .github/workflows/build-docker.yml
  workflow_dispatch:

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/${{ github.repository_owner }}/tex-action:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    permissions:
      contents: write
      packages: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Compile LaTeX documents
        run: |
          mkdir -p output
          for file in *.tex; do
            pdflatex -output-directory output "$file"
          done

      - name: Convert LaTeX to DOCX
        run: |
          for file in *.tex; do
            name="${file%.tex}"
            pandoc "$file" -o "output/${name}.docx"
          done

      - name: Create Release and Upload Artifacts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG_NAME="release-$(date +'%Y%m%d%H%M%S')"
          gh release create "$TAG_NAME" ./output/*.pdf ./output/*.docx \
            --title "Release $TAG_NAME" \
            --notes "Automated release of compiled PDF and DOCX documents" \
            --draft
